<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David — Frontend Developer</title>
  <meta name="description" content="Portfolio of David, a frontend developer crafting modern, performant, and beautiful web experiences with React, Next.js, and TypeScript.">
  <meta http-equiv="refresh" content="0; url=./portfolio/out/index.html">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #f0f0f5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1rem;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a {
      color: #6366f1;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting to portfolio&hellip;</p>
    <p style="margin-top: 0.5rem; font-size: 0.875rem; color: #a0a0b8;">
      If not redirected, <a href="./portfolio/out/index.html">click here</a>.
    </p>
  </div>
</body>
</html>
